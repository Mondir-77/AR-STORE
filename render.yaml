services:
  - type: web
    name: ar-store
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run db:seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@arstore.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
